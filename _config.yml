title: jaxpe
description: Normalizing-flow-enhanced gradient MCMC in JAX, with gravitational-wave parameter estimation (PE) as the flagship application.
remote_theme: just-the-docs/just-the-docs

plugins:
  - jekyll-remote-theme

url: https://gwnrtools.github.io
baseurl: /jaxpe

search_enabled: true
heading_anchors: true

aux_links:
  jaxpe on GitHub:
    - https://github.com/gwnrtools/jaxpe
aux_links_new_tab: true

footer_content: >-
  Copyright &copy; Prayush Kumar. Distributed under the
  <a href="https://github.com/gwnrtools/jaxpe/blob/master/LICENSE">MIT license</a>.

# Don't build the site out of package sources, build products or notebooks.
exclude:
  - examples/
  - jaxpe/
  - jaxpe.egg-info/
  - tests/
  - pyproject.toml
  - LICENSE
  - README.md
  - vendor/
  - Gemfile
  - Gemfile.lock
  - AGENTS.md
  - CLAUDE.md

# ── kramdown ────────────────────────────────────────────────────────────────
# math_engine mathjax: kramdown extracts $$...$$ spans/blocks and emits
# \(...\) / \[...\] wrappers for client-side MathJax (loaded in
# _includes/head_custom.html).
kramdown:
  math_engine: mathjax
  syntax_highlighter_opts:
    block:
      line_numbers: false
