title: jaxpe
description: Normalizing-flow-enhanced gradient MCMC in JAX, with gravitational-wave parameter estimation (PE) as the flagship application.
remote_theme: just-the-docs/just-the-docs

plugins:
  - jekyll-remote-theme

url: https://gwnrtools.github.io
baseurl: /jaxpe

search_enabled: true
heading_anchors: true

aux_links:
  jaxpe on GitHub:
    - https://github.com/gwnrtools/jaxpe
aux_links_new_tab: true

footer_content: >-
  Copyright &copy; Prayush Kumar. Distributed under the
  <a href="https://github.com/gwnrtools/jaxpe/blob/master/LICENSE">MIT license</a>.

# Don't build the site out of package sources, build products or notebooks. NOTE:
# examples/ is NOT excluded wholesale -- we deliberately publish the D4 timing report
# (examples/d4_timing_report.html, a static HTML page) and its figures
# (examples/figures/*.png), and exclude only the scripts, outputs and caches beneath it.
exclude:
  - examples/*.py          # all example scripts (the glob's * spans / in Jekyll,
                           # so this also covers examples/figures/make_d4_figures.py)
  - examples/compile_scaling.png   # stray output png (figures/*.png stay published)
  - examples/output/
  - examples/__pycache__/
  - jaxpe/
  - jaxpe.egg-info/
  - tests/
  - pyproject.toml
  - LICENSE
  - README.md
  - vendor/
  - Gemfile
  - Gemfile.lock
  - AGENTS.md
  - CLAUDE.md

# ── kramdown ────────────────────────────────────────────────────────────────
# kramdown syntax highlighting options
kramdown:
  syntax_highlighter_opts:
    block:
      line_numbers: false
